function makeGroup(){saveGroup();const c=encode('GROUP',state.group),url=location.href.split('#')[0]+`#view=ranking&event=${state.event.id}&data=${c}`;$('#groupOutput').innerHTML=`<div class="notice">Momentopname: deel opnieuw na nieuwe picks of uitslagen.</div><div class="codebox" id="groupCode">${c}</div><div class="row" style="margin-top:9px"><button class="btn" data-action="copy-group">Kopieer code</button><button class="btn good" data-action="share-group" data-url="${esc(url)}">Deel link</button></div>`}
function download(name,text){const u=URL.createObjectURL(new Blob([text],{type:'application/json'})),a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),500)}
function handleClick(e){const view=e.target.closest('[data-view]');if(view)return setView(view.dataset.view);const open=e.target.closest('[data-open-event]');if(open){closeModal();selectEvent(open.dataset.openEvent,open.dataset.target||'picks');return}if(e.target.closest('#eventSwitch'))return openEventModal();if(e.target.matches('[data-close-modal]')||e.target.closest('[data-close-modal]'))return closeModal();const fight=e.target.closest('[data-fight]'),fighter=e.target.closest('[data-winner]');if(fight&&fighter){const id=fight.dataset.fight;state.my.picks[id]??={};state.my.picks[id].winner=fighter.dataset.winner;saveMy();renderPicks();return}const seg=e.target.closest('[data-rank]');if(seg){state.rank=seg.dataset.rank;$$('.seg').forEach(x=>x.classList.toggle('active',x===seg));renderRanking();return}const a=e.target.closest('[data-action]');if(!a)return;const act=a.dataset.action;if(act==='import-players')importPlayers();if(act==='toggle-reveal'){if(!state.group.revealed&&!confirm('Voorspellingen zichtbaar maken voor iedereen?'))return;state.group.revealed=!state.group.revealed;saveGroup();renderAll()}if(act==='make-group')makeGroup();if(act==='export')download(`${state.event.id}-groep.json`,JSON.stringify(state.group,null,2));if(act==='reset'&&confirm('Alle lokale data voor dit event wissen?')){storage.remove(storage.key('group',state.event.id));storage.remove(storage.key('my',state.event.id));selectEvent(state.event.id,'events')}if(act==='copy-submission')copy($('#submissionCode').textContent).then(()=>announce('Inzendcode gekopieerd'));if(act==='share-submission')share(state.event.shortName+' voorspelling',$('#submissionCode').textContent);if(act==='copy-group')copy($('#groupCode').textContent).then(()=>announce('Groepscode gekopieerd'));if(act==='share-group')share(state.event.shortName+' groepsstand','Open de nieuwste groepsstand:',a.dataset.url)}
function handleChange(e){if(e.target.id==='playerName'){state.my.name=e.target.value;saveMy();updateSubmit();return}const fight=e.target.closest('[data-fight]');if(fight&&e.target.matches('[data-method]')){const p=state.my.picks[fight.dataset.fight]??={};p.method=e.target.value;if(p.method==='Decision')p.round=null;saveMy();renderPicks();return}if(fight&&e.target.matches('[data-round]')){const p=state.my.picks[fight.dataset.fight]??={};p.round=e.target.value?Number(e.target.value):null;saveMy();renderPicks();return}const box=e.target.closest('[data-result]');if(box){const id=box.dataset.result;state.group.results[id]??={};if(e.target.matches('[data-result-winner]'))state.group.results[id].winner=e.target.value;if(e.target.matches('[data-result-method]')){state.group.results[id].method=e.target.value;if(e.target.value==='Decision')state.group.results[id].round=null}if(e.target.matches('[data-result-round]'))state.group.results[id].round=e.target.value?Number(e.target.value):null;saveGroup();renderAll();return}if(e.target.id==='jsonImport'&&e.target.files[0]){e.target.files[0].text().then(t=>{try{const g=JSON.parse(t);if(g.eventId!==state.event.id)throw Error('Dit bestand hoort bij een ander event.');state.group=g;saveGroup();renderAll();announce('Back-up geïmporteerd')}catch(x){alert('Import mislukt: '+x.message)}})}}
document.addEventListener('click',handleClick);document.addEventListener('change',handleChange);$('#submitPicks').addEventListener('click',submit);const h=parseHash();const hashData=location.hash.match(/&data=(GROUP-[A-Za-z0-9_-]+)/)?.[1];state.view=h.view;selectEvent(h.event||nextEvent()?.id||EVENTS[0].id);if(hashData)try{const g=decode(hashData,'GROUP');const e=EVENTS.find(x=>x.id===g.eventId);if(e){selectEvent(e.id,'ranking');state.group=g;if(!PUBLISHED[e.id])storage.save(storage.key('group',e.id),g);renderAll()}}catch(err){console.warn(err)}setInterval(()=>renderHUD(),30000);
})();
</script></body></html>
